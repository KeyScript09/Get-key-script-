<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>HIRU GET KEY</title>
<style>
    body {
        background: #0f172a;
        color: white;
        text-align: center;
        font-family: Arial;
        padding-top: 100px;
    }
    .box {
        background: #1e293b;
        padding: 30px;
        border-radius: 15px;
        width: 300px;
        margin: auto;
        box-shadow: 0 0 20px #000;
    }
    button {
        background: #22c55e;
        border: none;
        padding: 10px 20px;
        color: white;
        border-radius: 10px;
        cursor: pointer;
    }
    input {
        width: 90%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 10px;
        border: none;
        text-align: center;
    }
</style>
</head>

<body>

<div class="box">
    <h2>🔑 GET KEY HIRU</h2>
    <p id="date"></p>

    <button onclick="getKey()">LẤY KEY</button>
    <br><br>

    <input id="keyBox" readonly placeholder="Key sẽ hiện ở đây">
    <br><br>

    <button onclick="copyKey()">COPY</button>
</div>

<script>
function getToday() {
    let d = new Date();
    let day = String(d.getDate()).padStart(2, '0');
    let month = String(d.getMonth() + 1).padStart(2, '0');
    let year = d.getFullYear();
    return day + month + year;
}

function reverse(str) {
    return str.split("").reverse().join("");
}

function getKey() {
    let date = getToday();
    let key = "Hiru-" + reverse(date) + "-V3";

    document.getElementById("keyBox").value = key;
    document.getElementById("date").innerText = "Hôm nay: " + date;
}

function copyKey() {
    let copyText = document.getElementById("keyBox");
    copyText.select();
    document.execCommand("copy");
    alert("Đã copy key!");
}
</script>

</body>
</html>
